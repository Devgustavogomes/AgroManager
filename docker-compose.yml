services:
  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - api
  api:
    build:
      context: .
      dockerfile: ./api/prod.Dockerfile
    ports:
      - "3000"
    env_file:
      - ./api/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    container_name: api
    networks:
      - api
      - database
      - cache

  postgres:
    image: postgres:16
    shm_size: 128mb
    container_name: local-postgres
    ports:
      - "5432"
    env_file:
      - ./infra/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - database

  redis:
    image: redis:8.2.3-alpine
    container_name: redis_local
    ports:
      - "6379"
    env_file:
      - ./infra/.env
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cache

volumes:
  postgres-data:
  redis-data:

networks:
  api:
  database:
  cache:
